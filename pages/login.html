<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ToDoist</title>

    <link rel="stylesheet" href="/styles/login-styles.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container vh-100 d-flex justify-content-center align-items-center">

        <div class="card login-card p-4">

            <img src="/icons/To Doist Logo.png" alt="Logo" class="login-logo">

            <h2 class="text-center">Log In</h2>

            <p class="subtitle text-center">
                Sign in to manage your tasks and stay productive.
            </p>

            <div class="input-container gap-2">
                <input type="text" placeholder="Username" id="usrname"class="form-control">
                <span class="error" id="UserError"></span>
                <input type="password" placeholder="Password" id="pwd" class="form-control">
                <span class="error" id="PwdError"></span>
            </div>

            <button class="btn login-btn" id="loginBtn">
                Log In
            </button>

            <div class="register-section">
                <span>Don't have an account?</span>
                <a href="signup.html">
                    Register here
                </a>
            </div>

        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> 
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../scripts/login.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
