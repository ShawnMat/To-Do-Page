<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up</title>

    <link rel="stylesheet" href="/styles/signup-styles.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
</head>

<body>

    <div class="container d-flex flex-column justify-content-center align-items-center vh-100">

        <div class="card signup-card shadow p-4">

            <img src="/icons/To Doist Logo.png" class="signup-logo">

            <h2 class="text-center">Create Account</h2>

            <p class="subtitle text-center">
                Join ToDoist and start organizing your life.
            </p>

            <div class="row g-3">

                <div class="col-6">
                    <input type="text" placeholder="First Name" id="fname" class="form-control">
                </div>

                <div class="col-6">
                    <input type="text" placeholder="Last Name" id="lname" class="form-control">
                </div>

                <div class="col-6">
                    <input type="number" placeholder="Age" id="age" class="form-control">
                </div>

                <div class="col-6">
                    <input type="tel" placeholder="Contact Number" id="cNum" class="form-control">
                </div>

                <div class="col-12">
                    <div class="gender-box">

                        <label class="gender-title">
                            Gender
                        </label>

                        <div class="d-flex gap-4">

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="gender" id="male">
                                <label class="form-check-label" for="male">
                                    Male
                                </label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="gender" id="female">
                                <label class="form-check-label" for="female">
                                    Female
                                </label>
                            </div>

                        </div>

                    </div>
                </div>
                <div class="col-12">
                    <input type="email" placeholder="Email Address" id="email" class="form-control">
                </div>

                <div class="col-12">
                    <input type="text" placeholder="Username" id="usrname" class="form-control">
                </div>

                <div class="col-6">
                    <input type="password" placeholder="Password" id="pwd" class="form-control">
                </div>

                <div class="col-6">
                    <input type="password" placeholder="Confirm Password" id="cpwd" class="form-control">
                </div>


                <div class="col-12">
                    <button class="btn signup-btn w-100" id="signupBtn">
                        Create Account
                    </button>
                </div>

            </div>

            <div class="login-section">
                <span>Already have an account?</span>
                <a href="login.html">Login here</a>
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../scripts/signup.js"></script>

</body>
</html>
