<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up</title>
    <link rel="stylesheet" href="/styles/signup-styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container d-flex flex-column justify-content-center align-items-center vh-100">
        <div class="card login-card shadow p-4 gap-3" style="width: 500px;">
        <h2 class="text-primary text-center">Sign Up</h2>
            <input type="text" placeholder="First Name" id="fname" class="form-control">
            <input type="text" placeholder="Last Name" id="lname" class="form-control">
            <input type="email" placeholder="Email ID" id="email" class="form-control">
            <input type="text" placeholder="Username" id="usrname" class="form-control">
            <input type="password" placeholder="Password" id="pwd" class="form-control">
            <input type="password" placeholder="Confirm Password" id="cpwd" class="form-control">
            <button class="btn login-btn btn-primary w-80" id="signupBtn">Sign Up</button>
            <div class="d-flex justify-content-center gap-2">
                <p>Already have an account?</p>
                <a href="login.html" class="text-decoration-none">Login here</a>
            </div>
        </div>
    </div>  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
   <script src="../scripts/signup.js"></script>
</body>
</html>
