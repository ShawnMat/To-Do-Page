<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Task Dashboard</title>

    <link
        rel="stylesheet"
        href="/styles/Dashboard.css"
    >

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">

        <div class="container-fluid">

            <a
                class="navbar-brand px-3"
                href="#"
            >
                <strong>Task Dashboard</strong>
            </a>

            <form class="d-flex gap-3">

                <input
                    class="form-control"
                    type="search"
                    placeholder="Search"
                >

                <button
                    class="btn btn-outline-success"
                    type="submit"
                >
                    Search
                </button>

            </form>

            <div class="px-3">

                <button
                    class="btn btn-danger px-4 fw-bold"
                    data-bs-toggle="modal"
                    data-bs-target="#addTaskModal"
                    type="button"
                >
                    + Add Task
                </button>

            </div>

        </div>

    </nav>

    <!-- FILTER BUTTONS -->

    <div class="container d-flex justify-content-center gap-3 mt-4 flex-wrap">

        <button
            class="btn btn-dark active"
            id="allTasksBtn"
        >
            All Tasks
        </button>

        <button
            class="btn btn-success"
            id="completedBtn"
        >
            Completed
        </button>

        <button
            class="btn btn-warning"
            id="pendingBtn"
        >
            Pending
        </button>

        <button
            class="btn btn-secondary"
            id="notStartedBtn"
        >
            Not Started
        </button>

    </div>

    <!-- TASKS CONTAINER -->

    <div class="container mt-5 mb-5">

        <div class="row">

            <div class="col-lg-12 right-cont">

            </div>

        </div>

    </div>

    <!-- MODAL -->

    <div
        class="modal fade"
        id="addTaskModal"
    >

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h4 class="modal-title">
                        Add New Task
                    </h4>

                    <button
                        class="btn-close"
                        type="button"
                        data-bs-dismiss="modal"
                    ></button>

                </div>

                <div class="modal-body">

                    <!-- TASK NAME -->

                    <div class="mb-3">

                        <label class="form-label">
                            Task Name <span class="text-danger">*</span>
                        </label>

                        <input
                            class="form-control"
                            type="text"
                            id="taskNameInput"
                            placeholder="Enter task name"
                        >

                    </div>

                    <!-- TASK DESCRIPTION -->

                    <div class="mb-3">

                        <label class="form-label">
                            Task Description
                        </label>

                        <textarea
                            class="form-control"
                            id="taskDescInput"
                            placeholder="Enter task description"
                            rows="3"
                        ></textarea>

                    </div>

                    <!-- START DATE -->

                    <div class="mb-3">

                        <label class="form-label">
                            Start Date
                        </label>

                        <input
                            class="form-control"
                            type="date"
                            id="taskStartInput"
                        >

                    </div>

                    <!-- DUE DATE -->

                    <div class="mb-3">

                        <label class="form-label">
                            Due Date
                        </label>

                        <input
                            class="form-control"
                            type="date"
                            id="taskDueInput"
                        >

                    </div>

                    <!-- STATUS -->

                    <div class="mb-3">

                        <label class="form-label">
                            Status <span class="text-danger">*</span>
                        </label>

                        <select
                            class="form-select"
                            id="status"
                        >

                            <option
                                selected
                                disabled
                                value=""
                            >
                                Choose Status
                            </option>

                            <option value="Not Started">
                                Not Started
                            </option>

                            <option value="Pending">
                                Pending
                            </option>

                            <option value="Completed">
                                Completed
                            </option>

                        </select>

                    </div>

                </div>

                <div class="modal-footer">

                    <button
                        class="btn btn-secondary"
                        type="button"
                        data-bs-dismiss="modal"
                    >
                        Close
                    </button>

                    <button
                        class="btn btn-primary"
                        id="addTaskBtn"
                    >
                        Submit
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- JQUERY -->

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- JS -->

    <script src="/scripts/Dashboard.js"></script>

    <!-- BOOTSTRAP -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
