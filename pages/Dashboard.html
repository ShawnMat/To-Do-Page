<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/styles/Dashboard.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <!-- <div class="container">

    </div> -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand px-3" href="#">"Username"</a>
            <form class="form-inline d-flex gap-3">
                <input class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
                <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
            </form>
        <div class="add_del_Container d-flex px-3 ">
            <button class="btn addTask btn-danger px-4 fw-bold mt-3" data-bs-toggle="modal" data-bs-target="#addTaskModal" type="button"> Add Task </button>
            <!-- <button class="btn deleteTask" type="button"> Delete Task </button> -->
        </div>
    </div>
</nav>

<div class="container categories d-flex justify-content-center gap-5 mt-3">
    <div class="allTasks"><button class="btn">All Tasks</button> </div>
    <div class="completed"><button class="btn">Completed</button> </div>
    <div class="inProgress"><button class="btn">In Progress</button> </div>
    <div class="notStarted"><button class="btn">Not Started</button> </div>
</div>

<div class="left-right-cont">
    <div class="container left-cont">
        <div class="modal fade" id="addTaskModal">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <div class="modal-title">Add Task</div>
                        <button class="btn-close" type="button", data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="taskNameInput-cont">
                            <label class="form-label">Task Name</label>
                            <input class="form-control" type="text" placeholder="Enter the Task Name", id="taskNameInput">
                        </div>
                        <div class="taskDescInput-cont">
                            <label class="form-label">Task Description</label>
                            <textarea class="form-control" type="text" placeholder="Enter the Task Name", id="taskDescInput"></textarea>
                        </div>
                        <div class="taskStartInput-cont">
                            <label class="form-label">Start Date</label>
                            <input class="form-control" type="date" placeholder="Enter the Task Name", id="taskStartInput">
                        </div>
                        <div class="taskDueInput-cont">
                            <label class="form-label">Due Date</label>
                            <input class="form-control" type="date" placeholder="Enter the Task Name", id="taskDueInput">
                        </div>
                        <div class="taskStatusInput-cont ">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="status">
                                <option selected disabled value="">Choose status</option>
                                <option value="Not Started">Not Started</option>
                                <option value="Pending">Pending</option>
                                <option value="Completed">Completed</option>
                            </select>
                            <!-- <input class="form-control" type="text" placeholder="Enter the Task Name", id="taskInput"> -->
                        </div>
                        <div class="modal-footer d-flex justify-content-center">
                            <div class="taskSubmit-cont">
                                <button class="btn" id="addTaskBtn" onclick="addTask()">Submit</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="container right-cont">

    </div>
</div>

<script src="/scripts/Dashboard.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
