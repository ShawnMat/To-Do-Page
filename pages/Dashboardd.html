<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Dashboard</title>

    <link rel="stylesheet" href="/styles/Dashboard.css">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary">

    <div class="container-fluid">

        <a class="navbar-brand px-3" href="#">
            Username
        </a>

        <div class="add_del_Container d-flex gap-2 px-3">

            <button
                class="btn btn-danger px-4 fw-bold mt-3"
                data-bs-toggle="modal"
                data-bs-target="#addTaskModal"
                type="button">
                Add Task
            </button>

            <button
                class="btn btn-danger px-4 fw-bold mt-3"
                onclick="showDeletedTasks()"
                type="button">
                Restore
            </button>

            <button
                type="button"
                class="btn btn-dark mt-3"
                onclick="logout()">
                Logout
            </button>

        </div>

    </div>

</nav>


<!-- FILTER BUTTONS -->
<div class="container d-flex justify-content-center gap-3 mt-3">

    <button class="btn border-black" id="allTasksBtn">
        All Tasks
    </button>

    <button class="btn border-black" id="completedBtn">
        Completed
    </button>

    <button class="btn border-black" id="pendingBtn">
        Pending
    </button>

    <button class="btn border-black" id="notStartedBtn">
        Not Started
    </button>

</div>


<!-- HEADER -->
<div class="container-fluid">

    <div class="card d-flex flex-row justify-content-between py-2 px-3 my-2 shadow">

        <p class="fw-bold">Task Name</p>
        <p class="fw-bold">Task Desc</p>
        <p class="fw-bold">Start Date</p>
        <p class="fw-bold">Due Date</p>
        <p class="fw-bold">Status</p>
        <p class="fw-bold">Priority</p>
        <p class="fw-bold">Actions</p>

    </div>


    <!-- TASK LIST -->
    <div class="left-cont justify-content-center gap-5 f-wrap container-fluid " style="width: 100%">

    </div>

</div>


<!-- ADD TASK MODAL -->
<div class="modal fade" id="addTaskModal">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5>Add Task</h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <input
                    class="form-control mb-2"
                    id="taskNameInput"
                    placeholder="Task Name">

                <textarea
                    class="form-control mb-2"
                    id="taskDescInput"
                    placeholder="Description">
                </textarea>

                <input
                    class="form-control mb-2"
                    id="taskStartInput"
                    placeholder="Start Date"
                    onfocus="this.type='date'"
                    onblur="if(!this.value)this.type='text'">

                <input
                    class="form-control mb-2"
                    id="taskDueInput"
                    placeholder="Due Date"
                    onfocus="this.type='date'"
                    onblur="if(!this.value)this.type='text'">

                <select
                    class="form-select mb-2"
                    id="priority">

                    <option disabled selected>
                        Choose Priority
                    </option>

                    <option>High</option>
                    <option>Normal</option>
                    <option>Low</option>

                </select>

                <select
                    class="form-select mb-2"
                    id="status">

                    <option disabled selected>
                        Choose Status
                    </option>

                    <option>Not Started</option>
                    <option>Pending</option>
                    <option>Completed</option>

                </select>

                <button
                    class="btn btn-primary w-100"
                    id="addTaskBtn">

                    Submit

                </button>

            </div>

        </div>

    </div>

</div>


<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="/scripts/Dashboardd.js"></script>

</body>
</html>
